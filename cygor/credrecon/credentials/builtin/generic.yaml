# Generic Protocol-Level Default Credentials
# ==========================================
#
# This file contains generic default credentials for various protocols.
# These are tried when no specific vendor/product match is found.
#
# Priority scale:
#   90-100: Very common defaults (admin/admin, root/root)
#   70-89:  Common defaults
#   50-69:  Less common defaults
#   30-49:  Rare defaults
#   1-29:   Very rare / specific configurations

# Default values applied to all credentials in this file
defaults:
  source: builtin
  category: generic

credentials:
  # ============================================
  # HTTP Generic Web Applications
  # ============================================
  - username: "admin"
    password: "admin"
    priority: 95
    protocols: ["http"]
    description: "Most common web admin default"

  - username: "admin"
    password: "password"
    priority: 90
    protocols: ["http"]

  - username: "admin"
    password: ""
    priority: 85
    protocols: ["http"]
    description: "Admin with blank password"

  - username: "administrator"
    password: "administrator"
    priority: 80
    protocols: ["http"]

  - username: "root"
    password: "root"
    priority: 85
    protocols: ["http"]

  - username: "root"
    password: "toor"
    priority: 75
    protocols: ["http"]

  - username: "user"
    password: "user"
    priority: 70
    protocols: ["http"]

  - username: "guest"
    password: "guest"
    priority: 65
    protocols: ["http"]

  - username: "test"
    password: "test"
    priority: 60
    protocols: ["http"]

