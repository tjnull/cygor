# ===================================
# Docker, Kubernetes, CI/CD, Container Registries, Monitoring

credentials:
  # ===========================================
  # JENKINS
  # ===========================================
  - vendor: Jenkins
    product: Jenkins
    category: cloud
    protocols: [http, https]
    login_paths: ["/login", "/j_acegi_security_check", "/securityRealm/commenceLogin"]
