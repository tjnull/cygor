# Database & Middleware Default Credentials
# ==========================================
# SQL databases, NoSQL, Message Queues, Caches

credentials:
  # ===========================================
  # MYSQL / MARIADB
  # ===========================================
  - vendor: Oracle
    product: MySQL
    category: databases
    protocols: [mysql]
    credentials:
      - username: root
        password: ""
        priority: 95
        description: "Default root with blank password"
      - username: root
        password: root
        priority: 90
      - username: root
        password: mysql
        priority: 85
      - username: root
        password: password
        priority: 80
      - username: root
        password: admin
        priority: 75
      - username: mysql
        password: mysql
        priority: 70
      - username: admin
        password: admin
        priority: 65
      - username: admin
        password: ""
        priority: 60
    tags: [sql, relational]

  - vendor: MariaDB
    product: MariaDB
    category: databases
    protocols: [mysql]
    credentials:
      - username: root
        password: ""
        priority: 95
      - username: root
        password: root
        priority: 90
      - username: root
        password: mariadb
        priority: 85
    tags: [sql, relational]

  # ===========================================
  # POSTGRESQL
  # ===========================================
  - vendor: PostgreSQL
    product: PostgreSQL
    category: databases
    protocols: [postgres]
    credentials:
      - username: postgres
        password: postgres
        priority: 95
      - username: postgres
        password: ""
        priority: 90
      - username: postgres
        password: admin
        priority: 85
      - username: postgres
        password: password
        priority: 80
      - username: admin
        password: admin
        priority: 75
      - username: pgsql
        password: pgsql
        priority: 70
    tags: [sql, relational]

  # ===========================================
  # MICROSOFT SQL SERVER
  # ===========================================
  - vendor: Microsoft
    product: SQL Server
    category: databases
    protocols: [mssql]
    credentials:
      - username: sa
        password: ""
        priority: 95
        description: "SA with blank password"
      - username: sa
        password: sa
        priority: 90
      - username: sa
        password: password
        priority: 85
      - username: sa
        password: Password123
        priority: 80
      - username: sa
        password: Password1
        priority: 75
      - username: admin
        password: admin
        priority: 70
    tags: [sql, relational, mssql]

  # ===========================================
  # ORACLE DATABASE
  # ===========================================
  - vendor: Oracle
    product: Oracle Database
    category: databases
    protocols: [oracle]
    credentials:
      - username: SYS
        password: change_on_install
        priority: 95
        description: "Default SYS password"
      - username: SYSTEM
        password: manager
        priority: 90
        description: "Default SYSTEM password"
      - username: SYSTEM
        password: oracle
        priority: 85
      - username: SCOTT
        password: tiger
        priority: 80
        description: "Classic demo account"
      - username: DBSNMP
        password: dbsnmp
        priority: 75
      - username: OUTLN
        password: outln
        priority: 70
      - username: MDSYS
        password: mdsys
        priority: 65
      - username: CTXSYS
        password: ctxsys
        priority: 60
    tags: [sql, relational, oracle]

  # ===========================================
  # MONGODB
  # ===========================================
  - vendor: MongoDB
    product: MongoDB
    category: databases
    protocols: [mongodb]
    credentials:
      - username: ""
        password: ""
        priority: 95
        description: "No auth (common misconfiguration)"
      - username: admin
        password: admin
        priority: 90
      - username: admin
        password: password
        priority: 85
      - username: root
        password: root
        priority: 80
      - username: mongo
        password: mongo
        priority: 75
    tags: [nosql, document]

  # ===========================================
  # REDIS
  # ===========================================
  - vendor: Redis
    product: Redis
    category: databases
    protocols: [redis]
    credentials:
      - username: ""
        password: ""
        priority: 95
        description: "No auth (common)"
      - username: ""
        password: redis
        priority: 90
      - username: ""
        password: foobared
        priority: 85
        description: "Redis example password"
      - username: default
        password: ""
        priority: 80
        description: "Redis 6+ default user"
    tags: [nosql, cache, key-value]

  # ===========================================
  # CASSANDRA
  # ===========================================
  - vendor: Apache
    product: Cassandra
    category: databases
    protocols: [cassandra]
    credentials:
      - username: cassandra
        password: cassandra
        priority: 95
        description: "Default Cassandra"
    tags: [nosql, wide-column]

  # ===========================================
  # COUCHDB
  # ===========================================
  - vendor: Apache
    product: CouchDB
    category: databases
    protocols: [couchdb, http, https]
    login_paths: ["/_utils/", "/_session"]
    credentials:
      - username: admin
        password: admin
        priority: 95
      - username: admin
        password: password
        priority: 90
      - username: ""
        password: ""
        priority: 85
        description: "Admin party mode"
    tags: [nosql, document]

  # ===========================================
  # COUCHBASE
  # ===========================================
  - vendor: Couchbase
