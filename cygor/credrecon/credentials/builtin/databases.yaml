        password: admin
        priority: 95
      - username: root
        password: root
        priority: 90
      - username: influxdb
        password: influxdb
        priority: 85
    tags: [timeseries, metrics]

  # ===========================================
  # ELASTICSEARCH
  # ===========================================
  - vendor: Elastic
    product: Elasticsearch
