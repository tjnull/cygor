# Web Application Default Credentials
# ====================================
# CMS, Frameworks, Admin Panels, Web Servers

credentials:
  # ===========================================
  # WORDPRESS
  # ===========================================
  - vendor: WordPress
    product: WordPress
    category: web
    protocols: [http, https]
    login_paths: ["/wp-login.php", "/wp-admin/"]
    credentials:
      - username: admin
        password: admin
        priority: 95
      - username: admin
        password: password
        priority: 90
      - username: administrator
        password: administrator
        priority: 85
      - username: wp-admin
        password: wp-admin
        priority: 80
