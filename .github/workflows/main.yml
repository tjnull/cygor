name: Cygor Build Pipeline

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub Release'
        required: false
        type: boolean
        default: false
      release_tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  build-linux:
    name: Build Linux ${{ matrix.arch }} - ${{ matrix.format }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: x64
            format: deb
            artifact: cygor-linux-x64-deb
          - arch: x64
            format: rpm
            artifact: cygor-linux-x64-rpm
          - arch: x64
            format: tarball
            artifact: cygor-linux-x64-tarball
          - arch: arm64
            format: deb
            artifact: cygor-linux-arm64-deb
          - arch: arm64
            format: rpm
            artifact: cygor-linux-arm64-rpm
          - arch: arm64
            format: tarball
            artifact: cygor-linux-arm64-tarball
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build Package
        run: |
          ARCH_FLAG=${{ matrix.arch == 'x64' && 'amd64' || 'arm64' }}
          if [[ "${GITHUB_REF_TYPE:-branch}" = "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="1.0.0"
          fi
          chmod +x packaging/build-${{ matrix.format }}.sh
          ./packaging/build-${{ matrix.format }}.sh --arch "$ARCH_FLAG" --version "$VERSION"

      - name: Verify Build Output
        run: |
          FORMAT="${{ matrix.format }}"
          ARCH="${{ matrix.arch }}"
          if [[ "${GITHUB_REF_TYPE:-branch}" = "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="1.0.0"
          fi

          if [ "$ARCH" = "x64" ]; then
            DEB_ARCH="amd64"
            RPM_ARCH="x86_64"
          else
            DEB_ARCH="arm64"
            RPM_ARCH="aarch64"
          fi

          if [ "$FORMAT" = "deb" ]; then
            FILE="cygor_${VERSION}_${DEB_ARCH}.deb"
          elif [ "$FORMAT" = "rpm" ]; then
            FILE="cygor-${VERSION}-1.el9.${RPM_ARCH}.rpm"
          else
            FILE="cygor-${VERSION}-linux-${DEB_ARCH}.tar.gz"
          fi

          if [ ! -f "$FILE" ]; then
            echo "ERROR: $FILE was not created"
            exit 1
          fi
          echo "Build successful. File size:"
          ls -lh "$FILE"

      - name: Test Package Installation
        run: |
          FORMAT="${{ matrix.format }}"
          ARCH="${{ matrix.arch }}"
          if [[ "${GITHUB_REF_TYPE:-branch}" = "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="1.0.0"
          fi

          if [ "$ARCH" = "x64" ]; then
            PLATFORM="linux/amd64"
            DEB_ARCH="amd64"
            RPM_ARCH="x86_64"
          else
            PLATFORM="linux/arm64"
            DEB_ARCH="arm64"
            RPM_ARCH="aarch64"
          fi

          if [ "$FORMAT" = "deb" ]; then
            FILE="cygor_${VERSION}_${DEB_ARCH}.deb"
            echo "=== Testing .deb package: $FILE ==="
            docker run --rm --platform "$PLATFORM" -v "$PWD":/test -w /test debian:bookworm bash -c "apt-get update -qq && (dpkg -i $FILE || apt-get install -f -y) && (cygor -h || true) && dpkg -r cygor"
          elif [ "$FORMAT" = "rpm" ]; then
            FILE="cygor-${VERSION}-1.el9.${RPM_ARCH}.rpm"
            echo "=== Testing .rpm package: $FILE ==="
            docker run --rm --platform "$PLATFORM" -v "$PWD":/test -w /test rockylinux:9 bash -c "dnf install -y $FILE && (cygor -h || true) && dnf remove -y cygor" || echo "RPM test skipped"
          else
            FILE="cygor-${VERSION}-linux-${DEB_ARCH}.tar.gz"
            echo "=== Testing tarball: $FILE ==="
            docker run --rm --platform "$PLATFORM" -v "$PWD":/test -w /test debian:bookworm bash -c "tar xzf $FILE && cd cygor-${VERSION}-linux-${DEB_ARCH} && ./bin/cygor -h || true"
          fi

      - name: Upload Package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            *.deb
            *.rpm
            *.tar.gz
          if-no-files-found: error
          retention-days: 7
          compression-level: 6

  build-windows:
    name: Build Windows x64 - EXE
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build Windows Package
        run: |
          $version = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}" -replace '^v', '' } else { "1.0.0" }
          .\packaging\build-windows.ps1 -Version $version

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: cygor-windows-x64
          path: cygor-*-windows-x64.zip
          if-no-files-found: error
          retention-days: 7
          compression-level: 6

  build-docker:
    name: Build Docker Image (multi-arch)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/cygor
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=raw,value=dev,enable=${{ github.ref_type != 'tag' }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker Image
        run: |
          echo "=== Testing Docker image ==="
          docker run --rm ghcr.io/${{ github.repository_owner }}/cygor:dev -h || true
          echo "Docker image test completed"

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-docker]
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.create_release == true) ||
      startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Linux x64 DEB
        uses: actions/download-artifact@v4
        with:
          name: cygor-linux-x64-deb
          path: dist/cygor-linux-x64-deb

      - name: Download Linux x64 RPM
        uses: actions/download-artifact@v4
        with:
          name: cygor-linux-x64-rpm
          path: dist/cygor-linux-x64-rpm

      - name: Download Linux ARM64 DEB
        uses: actions/download-artifact@v4
        with:
          name: cygor-linux-arm64-deb
          path: dist/cygor-linux-arm64-deb

      - name: Download Linux ARM64 RPM
        uses: actions/download-artifact@v4
        with:
          name: cygor-linux-arm64-rpm
          path: dist/cygor-linux-arm64-rpm

      - name: Download Linux x64 Tarball
        uses: actions/download-artifact@v4
        with:
          name: cygor-linux-x64-tarball
          path: dist/cygor-linux-x64-tarball

      - name: Download Linux ARM64 Tarball
        uses: actions/download-artifact@v4
        with:
          name: cygor-linux-arm64-tarball
          path: dist/cygor-linux-arm64-tarball

      - name: Download Windows
        uses: actions/download-artifact@v4
        with:
          name: cygor-windows-x64
          path: dist/cygor-windows-x64

      - name: List Downloaded Artifacts
        run: |
          echo "Downloaded artifacts:"
          find dist -type f -ls
          echo "=== Directory structure ==="
          tree dist || find dist -print

      - name: Organize Release Files
        run: |
          mkdir -p release
          # Find files in nested artifact directories
          find dist -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.zip" -o -name "*.tar.gz" \) -exec cp {} release/ \;
          echo "=== Release files ==="
          ls -lh release/ || echo "No files found!"
          
          if [ -z "$(ls -A release/)" ]; then
            echo "ERROR: No release files found!"
            exit 1
          fi

      - name: Generate Checksums
        run: |
          cd release
          sha256sum * > SHA256SUMS.txt
          echo "=== Generated Checksums ==="
          cat SHA256SUMS.txt

      - name: Determine Release Tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ inputs.release_tag }}" ]; then
              echo "tag=${{ inputs.release_tag }}" >> $GITHUB_OUTPUT
            else
              echo "tag=v$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
            fi
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Cygor Release ${{ steps.tag.outputs.tag }}"
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag, 'alpha') || contains(steps.tag.outputs.tag, 'beta') || contains(steps.tag.outputs.tag, 'rc') }}
          files: release/*
          body: |
            ## Cygor ${{ steps.tag.outputs.tag }}
            
            ### Installation
            
            #### Windows (.exe)
            ```powershell
            Invoke-WebRequest -Uri "https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.tag }}/cygor-windows-x64.zip" -OutFile cygor-windows-x64.zip
            Expand-Archive -Path cygor-windows-x64.zip -DestinationPath .
            .\cygor.exe -h
            ```
            
            #### Debian/Ubuntu (.deb)
            ```bash
            # x64
            wget https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.tag }}/cygor_1.0.0_amd64.deb
            sudo dpkg -i cygor_1.0.0_amd64.deb
            
            # ARM64
            wget https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.tag }}/cygor_1.0.0_arm64.deb
            sudo dpkg -i cygor_1.0.0_arm64.deb
            ```
            
            #### RHEL/Rocky/Fedora (.rpm)
            ```bash
            # x64
            wget https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.tag }}/cygor-1.0.0-1.x86_64.rpm
            sudo dnf install cygor-1.0.0-1.x86_64.rpm

            # ARM64
            wget https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.tag }}/cygor-1.0.0-1.aarch64.rpm
            sudo dnf install cygor-1.0.0-1.aarch64.rpm
            ```

            #### Any Linux (portable tarball)
            ```bash
            # x64
            tar xzf cygor-1.0.0-linux-amd64.tar.gz
            cd cygor-1.0.0-linux-amd64
            sudo ./install-deps.sh
            ./bin/cygor --help

            # ARM64
            tar xzf cygor-1.0.0-linux-arm64.tar.gz
            cd cygor-1.0.0-linux-arm64
            sudo ./install-deps.sh
            ./bin/cygor --help
            ```

            #### Docker
            ```bash
            docker pull ghcr.io/${{ github.repository_owner }}/cygor:${{ steps.tag.outputs.tag }}
            docker pull ghcr.io/${{ github.repository_owner }}/cygor:latest
            ```
            
            ### Checksums
            See `SHA256SUMS.txt` for file verification.
            
            ### Packages Included
            - `cygor-windows-x64.zip` - Windows x86_64 executable
            - `cygor_1.0.0_amd64.deb` - Debian/Ubuntu x86_64 package
            - `cygor_1.0.0_arm64.deb` - Debian/Ubuntu ARM64 package
            - `cygor-1.0.0-1.x86_64.rpm` - RHEL/Rocky/Fedora x86_64 package
            - `cygor-1.0.0-1.aarch64.rpm` - RHEL/Rocky/Fedora ARM64 package
            - `cygor-1.0.0-linux-amd64.tar.gz` - Portable Linux x86_64 tarball
            - `cygor-1.0.0-linux-arm64.tar.gz` - Portable Linux ARM64 tarball
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
