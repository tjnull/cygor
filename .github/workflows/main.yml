name: Build and Release Cygor Binaries (Single-File Linux Builds)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            docker_image: quay.io/pypa/manylinux2014_x86_64
            artifact_name: cygor-linux-x64
          - arch: arm64
            docker_image: quay.io/pypa/manylinux2014_aarch64
            artifact_name: cygor-linux-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show repository structure
        run: |
          echo "[*] Repository structure:"
          ls -R cygor || true

      - name: Enable QEMU for ARM64
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build Cygor binary
        run: |
          echo "Starting Linux build for ${{ matrix.arch }}"
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            PLATFORM="--platform linux/arm64"
          else
            PLATFORM=""
          fi

          docker run --rm $PLATFORM \
            -v "$PWD":/src -w /src ${{ matrix.docker_image }} /bin/bash -e -c "
          set -e

          echo '[*] Installing dependencies for Python 3.9 build...'
          yum install -y gcc openssl-devel bzip2-devel libffi-devel make wget postgresql-devel;

          echo '[*] Downloading and building Python 3.9 from source...'
          cd /tmp
          wget -q https://www.python.org/ftp/python/3.9.18/Python-3.9.18.tgz
          tar -xzf Python-3.9.18.tgz
          cd Python-3.9.18
          ./configure --enable-optimizations --prefix=/usr/local
          make -j2
          make altinstall
          ln -sf /usr/local/bin/python3.9 /usr/bin/python
          ln -sf /usr/local/bin/pip3.9 /usr/bin/pip

          echo '[*] Verifying Python installation...'
          python --version
          pip --version
          pip install --upgrade pip wheel setuptools

          echo '[*] Installing Python dependencies...'
          pip install pyinstaller fastapi uvicorn sqlalchemy asyncpg jinja2 colorama
          pip install psycopg2-binary || pip install psycopg2

          echo '[*] Verifying application directories...'
          ls -R cygor/webapp || (echo '[!] Missing cygor/webapp directory!' && exit 1)

          STATIC_PATH_ARG=\"\"
          if [ -d \"cygor/webapp/static\" ]; then
            STATIC_PATH_ARG=\"--add-data cygor/webapp/static:cygor/webapp/static\"
            echo '[*] Including static directory'
          else
            echo '[*] No static directory found — skipping'
          fi

          echo '[*] Building single-file binary with PyInstaller...'
          pyinstaller --onefile --clean --noconfirm \
            --add-data \"cygor/webapp/templates:cygor/webapp/templates\" \
            \$STATIC_PATH_ARG \
            --name cygor cygor/cli.py

          echo '[*] Checking dist/ contents...'
          ls -lh dist || true
          if [ ! -f dist/cygor ]; then
            echo '[!] Build failed: cygor binary not found in dist/'
            exit 1
          fi

          echo '[*] Verifying binary execution...'
          cd dist
          chmod +x cygor
          ./cygor --help || true

          echo '[*] Packaging release tarball...'
          tar -czf ../${{ matrix.artifact_name }}.tar.gz cygor
          chown $(id -u):$(id -g) ../${{ matrix.artifact_name }}.tar.gz
          echo '[✓] Done building for ${{ matrix.arch }}'
          "

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            **/dist/**/*.tar.gz
            **/*.tar.gz

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Verify binaries in containers before release
        run: |
          echo "[*] Testing x64 binary in container..."
          tar -xzf dist/cygor-linux-x64.tar.gz -C dist/
          chmod +x dist/cygor
          docker run --rm -v "$PWD/dist:/opt/cygor" -w /opt/cygor quay.io/pypa/manylinux2014_x86_64 /opt/cygor/cygor --help || true

          echo "[*] Testing ARM64 binary in container (via QEMU)..."
          docker run --rm --platform linux/arm64 -v "$PWD/dist:/opt/cygor" -w /opt/cygor quay.io/pypa/manylinux2014_aarch64 /opt/cygor/cygor --help || true

      - name: Generate SHA256 checksums
        run: |
          cd dist
          find . -type f -name "*.tar.gz" -exec sha256sum {} \; > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || 'manual-build' }}
          name: "Cygor Build (${{ github.ref_name || 'manual' }})"
          files: |
            dist/**/*.tar.gz
            dist/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
