name: Build and Release Cygor Binaries (Single-File Linux Builds)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            docker_image: quay.io/pypa/manylinux2014_x86_64
            artifact_name: cygor-linux-x64
          - arch: arm64
            docker_image: quay.io/pypa/manylinux2014_aarch64
            artifact_name: cygor-linux-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU for ARM64 builds
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      # ------------------------------------------------------
      # Build section (Single executable per architecture)
      # ------------------------------------------------------
      - name: Build Cygor single-file binary
        run: |
          echo "Starting Linux build for ${{ matrix.arch }}"
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            PLATFORM="--platform linux/arm64"
          else
            PLATFORM=""
          fi

          docker run --rm $PLATFORM \
            -v "$PWD":/src -w /src ${{ matrix.docker_image }} /bin/bash -e -c "
          set -e
          yum install -y python39 python39-pip;
          python3.9 -m venv venv;
          source venv/bin/activate;
          python -m pip install --upgrade pip;
          pip install pyinstaller fastapi uvicorn sqlalchemy asyncpg jinja2 psycopg2-binary colorama;
          echo '[*] Building single-file Cygor binary...';
          pyinstaller --onefile --clean --noconfirm \
            --add-data 'cygor/web/templates:cygor/web/templates' \
            --add-data 'cygor/web/static:cygor/web/static' \
            --name cygor cygor/cli.py;
          echo '[*] Checking dist/ contents...';
          ls -lh dist || true;
          if [ ! -f dist/cygor ]; then
            echo '[!] Build failed: cygor binary not found in dist/';
            exit 1;
          fi
          cd dist;
          ./cygor --help || true;
          tar -czf ../${{ matrix.artifact_name }}.tar.gz cygor;
          chown $(id -u):$(id -g) ../${{ matrix.artifact_name }}.tar.gz;
          echo '[✓] Done building for ${{ matrix.arch }}';
          "

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            **/dist/**/*.tar.gz
            **/*.tar.gz

  # ------------------------------------------------------
  # Publish GitHub Release
  # ------------------------------------------------------
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Generate SHA256 checksums
        run: |
          cd dist
          find . -type f -name "*.tar.gz" -exec sha256sum {} \; > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || 'manual-build' }}
          name: "Cygor Build (${{ github.ref_name || 'manual' }})"
          files: |
            dist/**/*.tar.gz
            dist/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
