name: Cygor Build Pipeline

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub Release'
        required: false
        type: boolean
        default: false
      release_tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  build-linux:
    name: Build Linux ${{ matrix.arch }} - ${{ matrix.format }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: x64
            platform: linux/amd64
            format: deb
            artifact: cygor-linux-x64-deb
          - arch: x64
            platform: linux/amd64
            format: rpm
            artifact: cygor-linux-x64-rpm
          - arch: arm64
            platform: linux/arm64
            format: deb
            artifact: cygor-linux-arm64-deb
          - arch: arm64
            platform: linux/arm64
            format: rpm
            artifact: cygor-linux-arm64-rpm
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Create Build Scripts
        run: |
          # Create Python entry point
          cat > create_entry.sh << 'ENTRY_SCRIPT'
          #!/bin/bash
          echo '#!/usr/bin/env python3' > cygor_entry.py
          echo 'import sys' >> cygor_entry.py
          echo 'from cygor.cli import main' >> cygor_entry.py
          echo 'if __name__ == "__main__":' >> cygor_entry.py
          echo '    sys.exit(main())' >> cygor_entry.py
          ENTRY_SCRIPT
          chmod +x create_entry.sh

          # Create Debian control file script
          cat > create_control.sh << 'CONTROL_SCRIPT'
          #!/bin/bash
          ARCH=$1
          echo 'Package: cygor' > package/DEBIAN/control
          echo 'Version: 1.0.0' >> package/DEBIAN/control
          echo 'Section: utils' >> package/DEBIAN/control
          echo 'Priority: optional' >> package/DEBIAN/control
          echo "Architecture: $ARCH" >> package/DEBIAN/control
          echo 'Maintainer: tjnull' >> package/DEBIAN/control
          echo 'Description: Cygor security enumeration tool' >> package/DEBIAN/control
          echo ' Automated scanner and enumeration framework' >> package/DEBIAN/control
          CONTROL_SCRIPT
          chmod +x create_control.sh

      - name: Build Binary
        run: |
          docker run --rm --platform ${{ matrix.platform }} \
            -v "$PWD":/src -w /src debian:bookworm bash -c '
            set -ex
            apt-get update -qq
            DEBIAN_FRONTEND=noninteractive apt-get install -y \
              python3.11 python3.11-dev python3-pip build-essential \
              libpq-dev libffi-dev zlib1g-dev libssl-dev zip git rpm alien fakeroot
            
            python3.11 -m pip install --break-system-packages --upgrade pip wheel setuptools
            python3.11 -m pip install --break-system-packages pyinstaller
            python3.11 -m pip install --break-system-packages \
              colorama python-libnmap requests smbmap tabulate \
              fastapi uvicorn jinja2 python-multipart \
              sqlmodel SQLAlchemy psycopg aiosqlite \
              lxml watchfiles pandas openpyxl
            python3.11 -m pip install --break-system-packages git+https://github.com/Pennyw0rth/NfsClient.git@master
            
            /src/create_entry.sh
            
            STATIC_PATH_ARG=""
            if [ -d "cygor/webapp/static" ]; then
              STATIC_PATH_ARG="--add-data cygor/webapp/static:cygor/webapp/static"
            fi
            
            pyinstaller --onefile --clean --noconfirm --name cygor --strip \
              --add-data "cygor/webapp/templates:cygor/webapp/templates" $STATIC_PATH_ARG \
              --hidden-import cygor.precheck --hidden-import cygor.workspace \
              --hidden-import cygor.banner --hidden-import cygor.scan \
              --hidden-import cygor.parse --hidden-import cygor.parse_ext \
              --hidden-import cygor.enumcli --hidden-import cygor.webctl \
              --hidden-import libnmap.parser --hidden-import smbmap \
              --hidden-import sqlmodel --hidden-import psycopg --hidden-import aiosqlite \
              --collect-submodules fastapi --collect-submodules uvicorn \
              --collect-submodules sqlalchemy --collect-submodules jinja2 \
              cygor_entry.py
            
            chmod +x dist/cygor
            strip dist/cygor || true
            
            mkdir -p package/usr/local/bin package/DEBIAN
            cp dist/cygor package/usr/local/bin/
            
            if [ "${{ matrix.arch }}" = "x64" ]; then
              /src/create_control.sh amd64
            else
              /src/create_control.sh arm64
            fi
            
            if [ "${{ matrix.format }}" = "deb" ]; then
              if [ "${{ matrix.arch }}" = "x64" ]; then
                fakeroot dpkg-deb --build package /src/cygor_1.0.0_amd64.deb
              else
                fakeroot dpkg-deb --build package /src/cygor_1.0.0_arm64.deb
              fi
              ls -lh /src/*.deb
            else
              fakeroot dpkg-deb --build package /tmp/cygor.deb
              alien --to-rpm --scripts /tmp/cygor.deb
              if [ "${{ matrix.arch }}" = "x64" ]; then
                mv *.rpm /src/cygor-1.0.0-1.x86_64.rpm
              else
                mv *.rpm /src/cygor-1.0.0-1.aarch64.rpm
              fi
              ls -lh /src/*.rpm
            fi
            '

      - name: Verify Build Output
        run: |
          FORMAT="${{ matrix.format }}"
          ARCH="${{ matrix.arch }}"
          
          if [ "$FORMAT" = "deb" ]; then
            if [ "$ARCH" = "x64" ]; then
              FILE="cygor_1.0.0_amd64.deb"
            else
              FILE="cygor_1.0.0_arm64.deb"
            fi
          else
            if [ "$ARCH" = "x64" ]; then
              FILE="cygor-1.0.0-1.x86_64.rpm"
            else
              FILE="cygor-1.0.0-1.aarch64.rpm"
            fi
          fi
          
          if [ ! -f "$FILE" ]; then
            echo "ERROR: $FILE was not created"
            exit 1
          fi
          echo "Build successful. File size:"
          ls -lh "$FILE"

      - name: Test Package Installation
        run: |
          FORMAT="${{ matrix.format }}"
          ARCH="${{ matrix.arch }}"
          PLATFORM="${{ matrix.platform }}"
          
          if [ "$FORMAT" = "deb" ]; then
            if [ "$ARCH" = "x64" ]; then
              FILE="cygor_1.0.0_amd64.deb"
            else
              FILE="cygor_1.0.0_arm64.deb"
            fi
            echo "=== Testing .deb package: $FILE ==="
            docker run --rm --platform "$PLATFORM" -v "$PWD":/test -w /test debian:bookworm bash -c "apt-get update -qq && (dpkg -i $FILE || apt-get install -f -y) && (cygor -h || true) && dpkg -r cygor"
          else
            if [ "$ARCH" = "x64" ]; then
              FILE="cygor-1.0.0-1.x86_64.rpm"
            else
              FILE="cygor-1.0.0-1.aarch64.rpm"
            fi
            echo "=== Testing .rpm package: $FILE ==="
            docker run --rm --platform "$PLATFORM" -v "$PWD":/test -w /test rockylinux:9 bash -c "dnf install -y $FILE && (cygor -h || true) && dnf remove -y cygor" || echo "RPM test skipped"
          fi

      - name: Upload Package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            *.deb
            *.rpm
          if-no-files-found: error
          retention-days: 7
          compression-level: 6

  build-windows:
    name: Build Windows x64 - EXE
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install pyinstaller
          python -m pip install colorama python-libnmap requests smbmap tabulate fastapi uvicorn jinja2 python-multipart sqlmodel SQLAlchemy psycopg aiosqlite lxml watchfiles pandas openpyxl
          python -m pip install git+https://github.com/Pennyw0rth/NfsClient.git@master

      - name: Create Entry Point
        run: |
          @"
          import sys
          from cygor.cli import main
          if __name__ == '__main__':
              sys.exit(main())
          "@ | Out-File -FilePath cygor_entry.py -Encoding utf8

      - name: Build Windows Executable
        run: |
          $staticArg = ""
          if (Test-Path "cygor/webapp/static") {
            $staticArg = "--add-data", "cygor/webapp/static;cygor/webapp/static"
          }
          
          $args = @(
            "--onefile",
            "--clean",
            "--noconfirm",
            "--name", "cygor",
            "--console",
            "--add-data", "cygor/webapp/templates;cygor/webapp/templates",
            "--hidden-import", "cygor.precheck",
            "--hidden-import", "cygor.workspace",
            "--hidden-import", "cygor.banner",
            "--hidden-import", "cygor.scan",
            "--hidden-import", "cygor.parse",
            "--hidden-import", "cygor.parse_ext",
            "--hidden-import", "cygor.enumcli",
            "--hidden-import", "cygor.webctl",
            "--hidden-import", "libnmap.parser",
            "--hidden-import", "smbmap",
            "--hidden-import", "sqlmodel",
            "--hidden-import", "psycopg",
            "--hidden-import", "aiosqlite",
            "--collect-submodules", "fastapi",
            "--collect-submodules", "uvicorn",
            "--collect-submodules", "sqlalchemy",
            "--collect-submodules", "jinja2",
            "cygor_entry.py"
          )
          
          if ($staticArg) {
            $args = $args[0..2] + $staticArg + $args[3..($args.Length-1)]
          }
          
          & pyinstaller $args

      - name: Verify Build Output
        run: |
          if (!(Test-Path "dist/cygor.exe")) {
            Write-Error "ERROR: cygor.exe was not created"
            exit 1
          }
          Write-Output "Build successful. File size:"
          Get-Item dist/cygor.exe | Select-Object Name, Length

      - name: Test Windows Binary
        continue-on-error: true
        run: |
          Write-Output "=== Testing cygor.exe ==="
          & dist/cygor.exe -h
          Write-Output "✅ Windows binary test completed"

      - name: Create ZIP Archive
        run: |
          Compress-Archive -Path dist/cygor.exe -DestinationPath cygor-windows-x64.zip
          Get-Item cygor-windows-x64.zip | Select-Object Name, Length

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: cygor-windows-x64
          path: cygor-windows-x64.zip
          if-no-files-found: error
          retention-days: 7
          compression-level: 6

  build-docker:
    name: Build Docker Image (multi-arch)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/cygor
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=raw,value=dev,enable=${{ github.ref_type != 'tag' }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker Image
        run: |
          echo "=== Testing Docker image ==="
          docker run --rm ghcr.io/${{ github.repository_owner }}/cygor:dev -h || true
          echo "Docker image test completed"

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-docker]
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.create_release == true) ||
      startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Wait for artifacts to be ready
        run: sleep 10

      - name: Download Linux x64 DEB
        uses: actions/download-artifact@v4
        with:
          name: cygor-linux-x64-deb
          path: dist/cygor-linux-x64-deb

      - name: Download Linux x64 RPM
        uses: actions/download-artifact@v4
        with:
          name: cygor-linux-x64-rpm
          path: dist/cygor-linux-x64-rpm

      - name: Download Linux ARM64 DEB
        uses: actions/download-artifact@v4
        with:
          name: cygor-linux-arm64-deb
          path: dist/cygor-linux-arm64-deb

      - name: Download Linux ARM64 RPM
        uses: actions/download-artifact@v4
        with:
          name: cygor-linux-arm64-rpm
          path: dist/cygor-linux-arm64-rpm

      - name: Download Windows
        uses: actions/download-artifact@v4
        with:
          name: cygor-windows-x64
          path: dist/cygor-windows-x64

      - name: List Downloaded Artifacts
        run: |
          echo "Downloaded artifacts:"
          find dist -type f -ls
          echo "=== Directory structure ==="
          tree dist || find dist -print

      - name: Organize Release Files
        run: |
          mkdir -p release
          # Find files in nested artifact directories
          find dist -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.zip" \) -exec cp {} release/ \;
          echo "=== Release files ==="
          ls -lh release/ || echo "No files found!"
          
          if [ -z "$(ls -A release/)" ]; then
            echo "ERROR: No release files found!"
            exit 1
          fi

      - name: Generate Checksums
        run: |
          cd release
          sha256sum * > SHA256SUMS.txt
          echo "=== Generated Checksums ==="
          cat SHA256SUMS.txt

      - name: Determine Release Tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ inputs.release_tag }}" ]; then
              echo "tag=${{ inputs.release_tag }}" >> $GITHUB_OUTPUT
            else
              echo "tag=v$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
            fi
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Cygor Release ${{ steps.tag.outputs.tag }}"
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag, 'alpha') || contains(steps.tag.outputs.tag, 'beta') || contains(steps.tag.outputs.tag, 'rc') }}
          files: release/*
          body: |
            ## Cygor ${{ steps.tag.outputs.tag }}
            
            ### Installation
            
            #### Windows (.exe)
            ```powershell
            Invoke-WebRequest -Uri "https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.tag }}/cygor-windows-x64.zip" -OutFile cygor-windows-x64.zip
            Expand-Archive -Path cygor-windows-x64.zip -DestinationPath .
            .\cygor.exe -h
            ```
            
            #### Debian/Ubuntu (.deb)
            ```bash
            # x64
            wget https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.tag }}/cygor_1.0.0_amd64.deb
            sudo dpkg -i cygor_1.0.0_amd64.deb
            
            # ARM64
            wget https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.tag }}/cygor_1.0.0_arm64.deb
            sudo dpkg -i cygor_1.0.0_arm64.deb
            ```
            
            #### RHEL/Rocky/Fedora (.rpm)
            ```bash
            # x64
            wget https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.tag }}/cygor-1.0.0-1.x86_64.rpm
            sudo dnf install cygor-1.0.0-1.x86_64.rpm
            
            # ARM64
            wget https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.tag }}/cygor-1.0.0-1.aarch64.rpm
            sudo dnf install cygor-1.0.0-1.aarch64.rpm
            ```
            
            #### Docker
            ```bash
            docker pull ghcr.io/${{ github.repository_owner }}/cygor:${{ steps.tag.outputs.tag }}
            docker pull ghcr.io/${{ github.repository_owner }}/cygor:latest
            ```
            
            ### Checksums
            See `SHA256SUMS.txt` for file verification.
            
            ### Packages Included
            - `cygor-windows-x64.zip` - Windows x86_64 executable
            - `cygor_1.0.0_amd64.deb` - Debian/Ubuntu x86_64 package
            - `cygor_1.0.0_arm64.deb` - Debian/Ubuntu ARM64 package
            - `cygor-1.0.0-1.x86_64.rpm` - RHEL/Rocky/Fedora x86_64 package
            - `cygor-1.0.0-1.aarch64.rpm` - RHEL/Rocky/Fedora ARM64 package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
