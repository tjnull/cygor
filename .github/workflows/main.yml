name: Cygor Linux + Docker Builds (ZIP + Smoke Tests)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

# ================================================================
# 1) Build Linux x64 Binary (ZIP)
# ================================================================
jobs:
  build-x64:
    name: Build Linux x64 Binary (ZIP)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build x64 Binary on Debian 12
        run: |
          docker run --rm --platform linux/amd64 \
            -v "$PWD":/src -w /src debian:bookworm /bin/bash -e -c "
          apt-get update -qq
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            python3.11 python3.11-venv python3.11-full build-essential \
            libpq-dev libffi-dev zlib1g-dev libssl-dev zip ca-certificates

          python3.11 -m venv /opt/venv
          source /opt/venv/bin/activate
          python -m ensurepip --upgrade
          pip install --upgrade pip wheel setuptools
          pip install pyinstaller fastapi uvicorn sqlalchemy asyncpg jinja2 colorama psycopg2-binary

          cd cygor
          STATIC_PATH_ARG=''
          if [ -d 'webapp/static' ]; then
            STATIC_PATH_ARG='--add-data webapp/static:webapp/static'
          fi
          pyinstaller --onefile --clean --noconfirm --name cygor \
            --add-data 'webapp/templates:webapp/templates' \
            \$STATIC_PATH_ARG cli.py

          cd dist && chmod +x cygor
          zip -9 /src/cygor-linux-x64.zip cygor
          "

      - name: Smoke Test x64 Binary
        run: |
          unzip -q cygor-linux-x64.zip -d test-x64
          chmod +x test-x64/cygor
          ./test-x64/cygor --help || (echo "Smoke test failed for x64 binary" && exit 1)

      - uses: actions/upload-artifact@v4
        with:
          name: cygor-linux-x64
          path: cygor-linux-x64.zip

# ================================================================
# 2) Build Linux ARM64 Binary (ZIP)
# ================================================================
  build-arm64:
    name: Build Linux ARM64 Binary (ZIP)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build ARM64 Binary on Debian 12
        run: |
          docker run --rm --platform linux/arm64 \
            -v "$PWD":/src -w /src debian:bookworm /bin/bash -e -c "
          apt-get update -qq
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            python3.11 python3.11-venv python3.11-full build-essential \
            libpq-dev libffi-dev zlib1g-dev libssl-dev zip ca-certificates

          python3.11 -m venv /opt/venv
          source /opt/venv/bin/activate
          python -m ensurepip --upgrade
          pip install --upgrade pip wheel setuptools
          pip install pyinstaller fastapi uvicorn sqlalchemy asyncpg jinja2 colorama psycopg2-binary

          cd cygor
          STATIC_PATH_ARG=''
          if [ -d 'webapp/static' ]; then
            STATIC_PATH_ARG='--add-data webapp/static:webapp/static'
          fi
          pyinstaller --onefile --clean --noconfirm --name cygor \
            --add-data 'webapp/templates:webapp/templates' \
            \$STATIC_PATH_ARG cli.py

          cd dist && chmod +x cygor
          zip -9 /src/cygor-linux-arm64.zip cygor
          "

      - name: Smoke Test ARM64 Binary
        run: |
          unzip -q cygor-linux-arm64.zip -d test-arm64
          chmod +x test-arm64/cygor
          docker run --rm --platform linux/arm64 \
            -v "$PWD/test-arm64":/test -w /test debian:bookworm /bin/bash -c "./cygor --help"

      - uses: actions/upload-artifact@v4
        with:
          name: cygor-linux-arm64
          path: cygor-linux-arm64.zip

# ================================================================
# 3) Build & Push Docker Image (Debian 13 base)
# ================================================================
  build-docker:
    name: Build Docker Image (Debian 13 base)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/cygor:latest
            ghcr.io/${{ github.repository_owner }}/cygor:${{ github.ref_name }}

# ================================================================
# 4) Create GitHub Release (ZIPs + SHA256)
# ================================================================
  release:
    name: Create GitHub Release (ZIPs + Checksums)
    runs-on: ubuntu-latest
    needs: [build-x64, build-arm64]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - run: |
          cd dist
          find . -type f -name "*.zip" -exec sha256sum {} \; > SHA256SUMS.txt
          cat SHA256SUMS.txt
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || 'manual-build' }}
          name: "Cygor Build (${{ github.ref_name || 'manual' }})"
          files: |
            dist/**/*.zip
            dist/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
