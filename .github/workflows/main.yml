name: Build and Release Cygor (Fast Multi-Arch)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build binaries (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            base_image: debian:bookworm
            artifact: cygor-linux-x64
          - arch: arm64
            base_image: debian:bookworm
            artifact: cygor-linux-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Build binary
        run: |
          echo "[*] Building ${{ matrix.arch }} binary..."
          docker run --rm --platform linux/${{ matrix.arch }} \
            -v "$PWD":/src -w /src \
            ${{ matrix.base_image }} /bin/bash -e -c "
          apt-get update -qq
          DEBIAN_FRONTEND=noninteractive apt-get install -y python3.9 python3.9-dev python3-pip python3-setuptools python3-wheel python3-venv build-essential libpq-dev libffi-dev zlib1g-dev libssl-dev
          python3.9 -m pip install --upgrade pip
          python3.9 -m pip install pyinstaller fastapi uvicorn sqlalchemy asyncpg jinja2 colorama psycopg2-binary
          cd cygor
          STATIC_PATH_ARG=''
          if [ -d 'webapp/static' ]; then
            STATIC_PATH_ARG='--add-data webapp/static:webapp/static'
          fi
          pyinstaller --onefile --clean --noconfirm --static-libpython \
            --add-data 'webapp/templates:webapp/templates' \
            \$STATIC_PATH_ARG \
            --name cygor cli.py
          cd dist && chmod +x cygor
          tar -czf /src/${{ matrix.artifact }}.tar.gz cygor
          "

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Prepare docker context
        run: |
          mkdir -p dockerbuild/amd64 dockerbuild/arm64
          tar -xzf dist/cygor-linux-x64.tar.gz -C dockerbuild/amd64
          tar -xzf dist/cygor-linux-arm64.tar.gz -C dockerbuild/arm64

      - name: Checksums
        run: |
          cd dist
          find . -name "*.tar.gz" -exec sha256sum {} \; > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push Debian 13 image (your Dockerfile)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/cygor:latest
            ghcr.io/${{ github.repository_owner }}/cygor:${{ github.ref_name }}

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || 'manual' }}
          name: "Cygor Build (${{ github.ref_name || 'manual' }})"
          files: |
            dist/**/*.tar.gz
            dist/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
