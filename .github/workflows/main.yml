name: Build and Release Cygor Binaries (Linux Only)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            docker_image: quay.io/pypa/manylinux2014_x86_64
            artifact_name: cygor-linux-x64
          - arch: arm64
            docker_image: quay.io/pypa/manylinux2014_aarch64
            artifact_name: cygor-linux-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU for ARM64 builds
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build Cygor binary inside manylinux container
        run: |
          echo "Starting Linux build for ${{ matrix.arch }}"
          docker run --rm --platform linux/${{ matrix.arch }} \
            -v "$PWD":/src -w /src ${{ matrix.docker_image }} /bin/bash -c "
          yum install -y python3-pip;
          python3 -m pip install --upgrade pip;
          python3 -m pip install pyinstaller fastapi uvicorn sqlalchemy asyncpg jinja2 psycopg2-binary colorama;
          pyinstaller --clean --noconfirm cygor.spec;
          cd dist;
          ./cygor --help || true;
          tar -czf ../${{ matrix.artifact_name }}.tar.gz cygor;
          chown $(id -u):$(id -g) ../${{ matrix.artifact_name }}.tar.gz;
          "

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/**/*.tar.gz
            ./*.tar.gz

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Generate SHA256 checksums
        run: |
          cd dist
          find . -type f -name "*.tar.gz" -exec sha256sum {} \; > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.tar.gz
            dist/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
