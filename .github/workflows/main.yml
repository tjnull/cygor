name: Build and Release Cygor Binaries

on:
  push:
    tags:
      - "v*"  # Build when version tags are pushed (e.g., v1.0.0)
  workflow_dispatch:  # Allow manual trigger from the Actions tab

jobs:
  build:
    name: Build for ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runner: ubuntu-latest
            artifact_name: cygor-linux-x64
            docker_image: quay.io/pypa/manylinux2014_x86_64
            ext: ""
          - name: linux-arm64
            runner: ubuntu-latest
            artifact_name: cygor-linux-arm64
            docker_image: quay.io/pypa/manylinux2014_aarch64
            ext: ""
          - name: macos-universal
            runner: macos-latest
            artifact_name: cygor-macos-universal
            ext: ""
          - name: windows-x64
            runner: windows-latest
            artifact_name: cygor-windows-x64
            ext: ".exe"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        if: matrix.runner != 'ubuntu-latest'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Enable QEMU for ARM64 builds (to emulate ARM on x86 GitHub hosts)
      - name: Set up QEMU for ARM64
        if: matrix.name == 'linux-arm64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      ######################################
      # Linux builds (x64 / ARM64)
      ######################################
      - name: Build inside manylinux container
        if: matrix.runner == 'ubuntu-latest'
        run: |
          echo "Starting Linux build for ${{ matrix.name }}"
          docker run --rm --platform linux/${{ matrix.name == 'linux-arm64' && 'arm64' || 'amd64' }} \
            -v "$PWD":/src -w /src ${{ matrix.docker_image }} /bin/bash -c "
          yum install -y python3-pip;
          python3 -m pip install --upgrade pip;
          python3 -m pip install pyinstaller fastapi uvicorn sqlalchemy asyncpg jinja2 psycopg2-binary colorama;
          pyinstaller --clean --noconfirm cygor.spec;
          cd dist;
          ./cygor --help || true;
          tar -czf ../${{ matrix.artifact_name }}.tar.gz cygor;
          chown $(id -u):$(id -g) ../${{ matrix.artifact_name }}.tar.gz;
          "

      ######################################
      # macOS and Windows builds
      ######################################
      - name: Install dependencies
        if: matrix.runner != 'ubuntu-latest'
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller fastapi uvicorn sqlalchemy asyncpg jinja2 psycopg2-binary colorama

      - name: Build executable with spec file
        if: matrix.runner != 'ubuntu-latest'
        run: |
          echo "Building Cygor for ${{ matrix.name }}"
          pyinstaller --clean --noconfirm cygor.spec
          cd dist
          if [ -f "cygor${{ matrix.ext }}" ]; then
            echo "Binary built successfully"
          else
            echo "Error: cygor${{ matrix.ext }} not found" && exit 1
          fi
          tar -czf ../${{ matrix.artifact_name }}.tar.gz cygor${{ matrix.ext }}
          cd ..

      ######################################
      # Upload Artifacts
      ######################################
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/**/*.tar.gz
            ./*.tar.gz

  ######################################
  # Release
  ######################################
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Generate SHA256 checksums
        run: |
          cd dist
          find . -type f -name "*.tar.gz" -exec sha256sum {} \; > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.tar.gz
            dist/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
