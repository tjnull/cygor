name: Build and Release Cygor (Single-File + Multi-Arch Docker Image)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build Binaries (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            docker_image: quay.io/pypa/manylinux2014_x86_64
            artifact_name: cygor-linux-x64
          - arch: arm64
            docker_image: quay.io/pypa/manylinux2014_aarch64
            artifact_name: cygor-linux-arm64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable QEMU for ARM64
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build PyInstaller binary
        run: |
          echo "[*] Starting Linux build for ${{ matrix.arch }}"
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            PLATFORM="--platform linux/arm64"
          else
            PLATFORM=""
          fi

          docker run --rm $PLATFORM \
            -v "$PWD":/src -w /src ${{ matrix.docker_image }} /bin/bash -e -c "
          set -e
          echo '[*] Installing build dependencies...'
          yum install -y gcc openssl-devel bzip2-devel libffi-devel make wget postgresql-devel zlib-devel readline-devel

          echo '[*] Installing Python 3.9...'
          cd /tmp
          wget -q https://www.python.org/ftp/python/3.9.18/Python-3.9.18.tgz
          tar -xzf Python-3.9.18.tgz && cd Python-3.9.18
          ./configure --enable-optimizations --prefix=/usr/local
          make -j2 && make altinstall
          ln -sf /usr/local/bin/python3.9 /usr/bin/python
          ln -sf /usr/local/bin/pip3.9 /usr/bin/pip
          python --version

          echo '[*] Installing Python dependencies...'
          pip install --upgrade pip wheel setuptools
          pip install pyinstaller fastapi uvicorn sqlalchemy asyncpg jinja2 colorama psycopg2-binary

          echo '[*] Verifying repo contents...'
          ls -R /src/cygor || (echo '[!] cygor directory missing!' && exit 1)
          cd /src

          STATIC_PATH_ARG=''
          if [ -d 'cygor/webapp/static' ]; then
            STATIC_PATH_ARG='--add-data cygor/webapp/static:cygor/webapp/static'
          fi

          echo '[*] Building single-file binary from cygor/cli.py...'
          cd cygor
          pyinstaller --onefile --clean --noconfirm \
            --add-data 'webapp/templates:webapp/templates' \
            \$STATIC_PATH_ARG \
            --name cygor cli.py

          echo '[*] Build complete, packaging...'
          cd dist && chmod +x cygor
          tar -czf /src/${{ matrix.artifact_name }}.tar.gz cygor
          echo '[✓] Done building ${{ matrix.artifact_name }}'
          "


      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/**/*.tar.gz
            **/*.tar.gz

  release:
    name: Publish Release & Debian 13 Docker Image
    runs-on: debian-latest
    needs: build

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Extract binaries for Docker context
        run: |
          rm -rf dockerbuild
          mkdir -p dockerbuild/amd64 dockerbuild/arm64
          tar -xzf dist/cygor-linux-x64.tar.gz -C dockerbuild/amd64
          tar -xzf dist/cygor-linux-arm64.tar.gz -C dockerbuild/arm64

      - name: Generate checksums
        run: |
          cd dist
          find . -type f -name "*.tar.gz" -exec sha256sum {} \; > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push multi-arch image (Debian 13 / Python 3.11)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/cygor:latest
            ghcr.io/${{ github.repository_owner }}/cygor:${{ github.ref_name }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || 'manual-build' }}
          name: "Cygor Build (${{ github.ref_name || 'manual' }})"
          files: |
            dist/**/*.tar.gz
            dist/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
