name: Build and Release Cygor Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - name: linux-x64
            runner: ubuntu-latest
            artifact_name: cygor-linux-x64
            docker_image: quay.io/pypa/manylinux2014_x86_64
            ext: ""
          # Linux ARM64 (Raspberry Pi, ARM servers)
          - name: linux-arm64
            runner: ubuntu-latest
            artifact_name: cygor-linux-arm64
            docker_image: quay.io/pypa/manylinux2014_aarch64
            ext: ""
          # macOS Universal (Intel + ARM)
          - name: macos-universal
            runner: macos-latest
            artifact_name: cygor-macos-universal
            ext: ""
          # Windows x64
          - name: windows-x64
            runner: windows-latest
            artifact_name: cygor-windows-x64
            ext: ".exe"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        if: matrix.runner != 'ubuntu-latest'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      ######################################
      # Linux Builds (x64 + ARM64)
      ######################################
      - name: Build on manylinux container
        if: matrix.runner == 'ubuntu-latest'
        run: |
          docker run --rm -v "$PWD":/src -w /src ${{ matrix.docker_image }} /bin/bash -c "
          yum install -y python3-pip;
          python3 -m pip install --upgrade pip;
          python3 -m pip install pyinstaller fastapi uvicorn sqlalchemy asyncpg jinja2 psycopg2-binary colorama;
          pyinstaller --onefile --clean \
            --add-data 'cygor/web/templates:cygor/web/templates' \
            --add-data 'cygor/web/static:cygor/web/static' \
            --name cygor cygor/cli.py;
          cd dist;
          tar -czf ../${{ matrix.artifact_name }}.tar.gz cygor;
          "

      ######################################
      # macOS / Windows Builds
      ######################################
      - name: Install dependencies
        if: matrix.runner != 'ubuntu-latest'
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller fastapi uvicorn sqlalchemy asyncpg jinja2 psycopg2-binary colorama

      - name: Build executable
        if: matrix.runner != 'ubuntu-latest'
        run: |
          pyinstaller --onefile --clean \
            --add-data "cygor/web/templates:cygor/web/templates" \
            --add-data "cygor/web/static:cygor/web/static" \
            --name cygor${{ matrix.ext }} cygor/cli.py
          cd dist
          tar -czf ../${{ matrix.artifact_name }}.tar.gz cygor${{ matrix.ext }}
          cd ..

      ######################################
      # Verify and Upload
      ######################################
      - name: Verify artifact exists
        run: |
          echo "Verifying build artifacts..."
          ls -lh dist || true
          ls -lh *.tar.gz || true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/**/*.tar.gz
            ./*.tar.gz

  ######################################
  # Release Creation
  ######################################
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Generate checksums
        run: |
          cd dist
          find . -type f -name "*.tar.gz" -exec sha256sum {} \; > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.tar.gz
            dist/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
