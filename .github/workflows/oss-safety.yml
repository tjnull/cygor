name: OSS Safety Check

# Server-side guard for the public repo. Runs on every push and PR to main/dev
# and fails the build if anything enterprise-shaped sneaks in. This is the real
# enforcement — it cannot be bypassed by `git push --no-verify`, unlike a
# local pre-push hook.
#
# Install: drop this file at .github/workflows/oss-safety.yml in the PUBLIC
# cygor repo. Then enable branch protection rules on main (Settings → Rules)
# requiring "OSS Safety Check" to pass before merging.
#
# False positives: the script greps for specific patterns; if a legitimate use
# of one of the keywords trips the check, add an exclusion to KEYWORD_ALLOWED
# below or annotate the line with `# noqa: oss-safety` (the script honors that).

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  oss-safety:
    name: Verify no enterprise content leaked
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Refuse forbidden directories
        run: |
          set -e
          BAD=""
          for dir in cygor/enterprise cygor/webapp/enterprise cygor/licensing cygor/premium; do
            if [ -d "$dir" ]; then
              BAD="$BAD $dir"
            fi
          done
          if [ -n "$BAD" ]; then
            echo "::error::Forbidden enterprise-only directories present:$BAD"
            echo "These paths must not exist on dev/main. Move the contents elsewhere or"
            echo "remove them, then re-push."
            exit 1
          fi

      - name: Refuse forbidden files
        run: |
          set -e
          # Filenames that imply enterprise gating logic. Add patterns here as new
          # enterprise-only files get introduced.
          BAD_FILES=$(find cygor -type f \( \
              -iname "license_check*" -o \
              -iname "*licensing.py" -o \
              -iname "paid_features*" -o \
              -iname "premium_*.py" -o \
              -iname "enterprise_only*" \
            \) 2>/dev/null || true)
          if [ -n "$BAD_FILES" ]; then
            echo "::error::Forbidden filenames detected:"
            echo "$BAD_FILES"
            exit 1
          fi

      - name: Refuse forbidden code patterns
        run: |
          set -e
          # Keyword scan. Each keyword search excludes lines containing
          # `noqa: oss-safety` (manual override) and excludes test fixtures
          # that legitimately mention "premium" / "enterprise" as product
          # vocabulary (e.g., MITRE ATT&CK Enterprise matrix, Modicon
          # Premium PLC fingerprints).
          KEYWORDS=(
            "license_check"
            "verify_license"
            "require_enterprise"
            "is_premium_user"
            "paid_tier_only"
            "enterprise_only_feature"
          )
          FAIL=0
          for kw in "${KEYWORDS[@]}"; do
            HITS=$(git grep -nE "$kw" -- 'cygor/**/*.py' 'cygor/**/*.html' 2>/dev/null | grep -v "noqa: oss-safety" || true)
            if [ -n "$HITS" ]; then
              echo "::error::Forbidden keyword '$kw' found:"
              echo "$HITS"
              FAIL=1
            fi
          done
          exit $FAIL

      - name: Refuse merges from enterprise branches
        if: github.event_name == 'push'
        run: |
          set -e
          # Walk every merge commit in this push and refuse if its second
          # parent is reachable from a branch named enterprise* on origin.
          # This catches accidental `git merge enterprise-dev` operations.
          MERGES=$(git log --merges --format='%H' "${{ github.event.before }}..${{ github.event.after }}" 2>/dev/null || true)
          if [ -z "$MERGES" ]; then
            echo "No merge commits in this push — skipping check."
            exit 0
          fi

          # Pull every remote ref so we can test reachability against
          # potential enterprise branches even though they shouldn't exist
          # on this public repo.
          git fetch --no-tags origin '+refs/heads/enterprise*:refs/remotes/origin/enterprise*' 2>/dev/null || true

          FAIL=0
          for sha in $MERGES; do
            for parent in $(git log -1 --format='%P' "$sha"); do
              # Skip the first parent (always the receiving branch).
              if [ "$parent" = "$(git log -1 --format='%P' $sha | awk '{print $1}')" ]; then
                continue
              fi
              for ent in $(git for-each-ref --format='%(refname:short)' 'refs/remotes/origin/enterprise*'); do
                if git merge-base --is-ancestor "$parent" "$ent" 2>/dev/null; then
                  echo "::error::Merge commit $sha pulls in $parent which is on $ent."
                  echo "         dev/main must not receive merges from enterprise branches."
                  echo "         Cherry-pick individual commits instead:"
                  echo "           git cherry-pick $parent"
                  FAIL=1
                fi
              done
            done
          done
          exit $FAIL

      - name: Install system build deps
        run: sudo apt-get update && sudo apt-get install -y libkrb5-dev

      - name: Build smoke test
        run: |
          # Catches imports of enterprise-only modules that didn't get caught
          # by file/keyword scans. If `pip install -e .` succeeds and `python
          # -c "import cygor"` doesn't fail, the public package is internally
          # consistent.
          python -m pip install --upgrade pip
          pip install -e . 2>&1 | tail -20
          python -c "import cygor; print('cygor', cygor.__version__)"
          python -c "from cygor import cli; print('cli loads')"
          python -c "from cygor.fingerprinting import lookup, fingerprint; print('fingerprint loads')"
